name: "[DEPRECATED] 週末レースデータ事前取得 (TFJV移行で不要)"

# このワークフローは TFJV ベース設計への完全移行で不要になりました。
# 過去成績データは convert_tfjv.py 経由で tfjv_all.parquet に統合されています。
# 手動実行のみ可能 (workflow_dispatch)。schedule は無効化済み。

on:
  # schedule:
  #   # 旧: 毎週火曜 9:00 JST に実行 → TFJV移行で不要、毎週失敗メールが出るため無効化 (2026-06-09)
  #   - cron: '0 0 * * 2'
  #   - cron: '0 0 * * 3'
  workflow_dispatch:  # 手動実行のみ可能

jobs:
  prefetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "[DEPRECATED 警告]"
        run: |
          echo "::warning::このワークフローは DEPRECATED です。TFJV ベースに移行済みで不要。"
          echo "::warning::手動実行された場合のみ動作します。"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: |
          pip install requests beautifulsoup4 lxml pandas

      - name: 週末レースデータ取得
        run: python .github/scripts/prefetch_races.py
        timeout-minutes: 30

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saved_sessions/
          git diff --cached --quiet || git commit -m "chore: 週末レースデータ事前取得 $(date '+%Y-%m-%d')"
          git push
