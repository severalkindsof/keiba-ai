name: 週末レースデータ事前取得

on:
  schedule:
    # 毎週火曜 9:00 JST (= 月曜 0:00 UTC) に実行
    - cron: '0 0 * * 2'
    # 毎週水曜 9:00 JST (= 火曜 0:00 UTC) にも念のため実行
    - cron: '0 0 * * 3'
  workflow_dispatch:  # 手動実行も可能

jobs:
  prefetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット権限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: |
          pip install requests beautifulsoup4 lxml pandas

      - name: 週末レースデータ取得
        run: python .github/scripts/prefetch_races.py
        timeout-minutes: 30

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saved_sessions/
          git diff --cached --quiet || git commit -m "chore: 週末レースデータ事前取得 $(date '+%Y-%m-%d')"
          git push
